name: ARBK farm matrix diagnostic

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        range:
          - { start: '110300', end: '110304' }
          - { start: '110305', end: '110309' }
          - { start: '110310', end: '110314' }
          - { start: '110315', end: '110319' }
          - { start: '110320', end: '110324' }
          - { start: '110325', end: '110329' }
          - { start: '110330', end: '110334' }
          - { start: '110335', end: '110339' }
          - { start: '110340', end: '110344' }
          - { start: '110345', end: '110349' }

    steps:
      - uses: actions/checkout@v4

      - name: Show runner public IP
        id: ip
        run: |
          IP=$(curl -s --max-time 8 https://api.ipify.org)
          echo "runner IP: $IP for range ${{ matrix.range.start }}-${{ matrix.range.end }}"
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Install xvfb
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone cf-clearance-scraper
        run: |
          git clone --depth 1 https://github.com/zfcsoftware/cf-clearance-scraper.git /tmp/cf
          cd /tmp/cf
          npm install --silent

      - name: Start cf-clearance-scraper in background
        run: |
          cd /tmp/cf
          nohup xvfb-run -a -s "-screen 0 1280x1024x24" node src/index.js > /tmp/cf.log 2>&1 &
          sleep 30
          tail -20 /tmp/cf.log
          ss -tlnp | grep 3000 || echo "port 3000 not listening"

      - name: Install scrape dependencies
        run: npm install --silent axios crypto-js

      - name: Run scrape
        env:
          START_ID: ${{ matrix.range.start }}
          END_ID: ${{ matrix.range.end }}
          DELAY_MS: '0'
          OUT_DIR: ${{ github.workspace }}/out
          RUNNER_IP: ${{ steps.ip.outputs.ip }}
        run: node farm/scrape.js

      - name: Upload records artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-${{ matrix.range.start }}-${{ matrix.range.end }}
          path: out/
          retention-days: 7
          if-no-files-found: warn
